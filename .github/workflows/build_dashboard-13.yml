name: Build Elections 2026 APK v15 - Pure Flutter Rapport

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Decode all sources
        shell: python3 {0}
        run: |
          import base64, os
          os.makedirs('dart_src', exist_ok=True)
          files = {
            'dart_src/main.dart': "",
            'dart_src/election_data.dart': "",
            'dart_src/db_helper.dart': "",
            'dart_src/saisie_screen.dart': "",
            'dart_src/graphiques_screen.dart': "",
            'dart_src/rapport_screen.dart': "",
            'dart_src/pubspec.yaml': "",
          }
          for path, b64 in files.items():
            with open(path, 'wb') as f:
              f.write(base64.b64decode(b64))
          print("All sources decoded OK")

      - name: Create Flutter project
        run: |
          flutter create --org dj.elections --project-name elections2026 --platforms android elections_app
          cp dart_src/main.dart elections_app/lib/main.dart
          cp dart_src/election_data.dart elections_app/lib/election_data.dart
          cp dart_src/db_helper.dart elections_app/lib/db_helper.dart
          cp dart_src/saisie_screen.dart elections_app/lib/saisie_screen.dart
          cp dart_src/graphiques_screen.dart elections_app/lib/graphiques_screen.dart
          cp dart_src/rapport_screen.dart elections_app/lib/rapport_screen.dart
          cp dart_src/pubspec.yaml elections_app/pubspec.yaml
          sed -i 's/android:label="elections2026"/android:label="Elections 2026"/' elections_app/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        working-directory: elections_app
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Elections2026-v15-Pure-Flutter-Rapport
          path: elections_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

name: Build Elections 2026 APK - Dashboard 18/03

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Decode sources
        shell: python3 {0}
        run: |
          import base64, os
          os.makedirs('dart_src', exist_ok=True)
          with open('dart_src/main.dart', 'wb') as f:
            f.write(base64.b64decode(""))
          with open('dart_src/election_data.dart', 'wb') as f:
            f.write(base64.b64decode(""))
          with open('dart_src/pubspec.yaml', 'wb') as f:
            f.write(base64.b64decode(""))
          print("All sources decoded OK")

      - name: Create Flutter project scaffold
        run: |
          flutter create --org dj.elections --project-name elections2026 --platforms android elections_app
          cp dart_src/main.dart elections_app/lib/main.dart
          cp dart_src/election_data.dart elections_app/lib/election_data.dart
          cp dart_src/pubspec.yaml elections_app/pubspec.yaml
          sed -i 's/android:label="elections2026"/android:label="Elections 2026"/' elections_app/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        working-directory: elections_app
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Elections2026-Dashboard-18-03
          path: elections_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

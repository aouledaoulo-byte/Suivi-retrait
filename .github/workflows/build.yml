name: Build Elections 2026 APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Prepare sources
        run: |
          if [ -d "Src" ]; then mv Src src; fi

      - name: Create Flutter project
        run: |
          flutter create --org dj.elections --project-name elections2026 --platforms android elections_app
          cp src/main.dart elections_app/lib/main.dart
          cp src/election_data.dart elections_app/lib/election_data.dart
          cp src/db_helper.dart elections_app/lib/db_helper.dart
          cp src/saisie_screen.dart elections_app/lib/saisie_screen.dart
          cp src/graphiques_screen.dart elections_app/lib/graphiques_screen.dart
          cp src/rapport_screen.dart elections_app/lib/rapport_screen.dart
          cp src/pubspec.yaml elections_app/pubspec.yaml
          sed -i 's/android:label="elections2026"/android:label="Elections 2026"/' elections_app/android/app/src/main/AndroidManifest.xml

      - name: Fix Kotlin version
        working-directory: elections_app/android
        run: |
          # Print current build.gradle for debug
          cat build.gradle | head -20
          # Force kotlin version - add at top if not present
          if grep -q "kotlin_version" build.gradle; then
            sed -i "s/kotlin_version = '[^']*'/kotlin_version = '1.9.0'/" build.gradle
          else
            sed -i "1s/^/buildscript { ext.kotlin_version = '1.9.0' }\n/" build.gradle
          fi
          # Add resolution strategy to app/build.gradle
          cat >> app/build.gradle << 'GRADLE'

          configurations.all {
            resolutionStrategy {
              force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
              force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0'
              force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
            }
          }
          GRADLE

      - name: Build APK
        working-directory: elections_app
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: Elections2026-v20-Data-28mars
          path: elections_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
